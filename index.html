<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibbles Brew</title>

    <style>
        body {
            background-color: #b7d1c4;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-style: italic;
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            margin-bottom: 1rem;
        }

        .page {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1000px;
            padding: 1.5rem;
        }

        .content {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-image {
            width: 90%;
            max-width: 350px;
            border-radius: 12px;
            cursor: pointer;
        }

        .buttons {
            display: flex;
            gap: 2rem;
            margin: 1.5rem 0;
            justify-content: center;
        }

        .img-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .img-btn-wrapper img {
            width: 140px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .img-btn-wrapper img:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .btn-label {
            margin-top: 0.4rem;
            font-size: 0.95rem;
            font-weight: bold;
            color: #2f3e36;
        }

        .menu-image,
        .about-image {
            width: 95%;
            max-width: 420px;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            cursor: pointer;
        }

        .events-wrapper {
            position: fixed;
            top: 1rem;
            right: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .events-wrapper img {
            width: 60px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .events-wrapper img:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .events-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 0.25rem;
            color: #2f3e36;
        }

        .events-panel {
            position: fixed;
            top: 5.5rem;
            right: 1rem;
            width: 260px;
            background-color: #e6f0ea;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
            display: none;
            z-index: 999;
        }

        .event {
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #c2d6cb;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 0;
            cursor: pointer;
            font-size: 0.9rem;
            color: red;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .event:hover .delete-btn {
            opacity: 1;
        }

        .add-event-btn {
            margin-top: 0.5rem;
            padding: 0.5rem 0.8rem;
            border: none;
            border-radius: 8px;
            background-color: #2f3e36;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .booking-modal,
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }

        .booking-content,
        .password-content {
            background: #fff;
            padding: 1.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 450px;
        }

        .booking-content input,
        .booking-content textarea,
        .password-content input {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .selected-dates {
            background: #f0f0f0;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .date-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0;
        }

        .remove-date {
            cursor: pointer;
            color: red;
            font-weight: bold;
        }

        .submit-btn {
            background: #2f3e36;
            color: white;
        }

        .close-btn {
            background: #ccc;
        }

        /* LIGHTBOX */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 10px;
            cursor: zoom-out;
        }

        @media (max-width: 768px) {
            .events-panel {
                width: 90%;
                right: 5%;
            }
        }
    </style>
</head>

<body>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightboxImg" src="" alt="Expanded">
    </div>

    <div class="events-wrapper" onclick="toggleEvents()">
        <img src="sun.png" alt="Events">
        <div class="events-label">Events</div>
    </div>

    <div id="eventsPanel" class="events-panel">
        <h2>Upcoming Events</h2>
        <div id="eventsList"></div>
        <button class="add-event-btn" onclick="openPasswordModal('add')">Add Event</button>
    </div>

    <div id="bookingModal" class="booking-modal">
        <div class="booking-content">
            <h2>Book a Date</h2>
            <input type="date" id="bookingDate">

            <div class="selected-dates">
                <strong>Selected Dates:</strong>
                <div id="datesList"></div>
            </div>

            <textarea id="bookingComment" placeholder="Location + Contact info"></textarea>

            <button class="submit-btn" onclick="sendBooking()">Send</button>
            <button class="close-btn" onclick="closeBooking()">Close</button>
        </div>
    </div>

    <div id="passwordModal" class="password-modal">
        <div class="password-content">
            <h2>Enter Password</h2>
            <input type="password" id="passwordInput">
            <button class="submit-btn" onclick="checkPassword()">Submit</button>
            <button class="close-btn" onclick="closePasswordModal()">Cancel</button>
        </div>
    </div>

    <div class="page">
        <div class="content">
            <h1>Bibbles Brew</h1>

            <img src="IMG_9814.JPG" class="main-image" onclick="openLightbox(this.src)">

            <div class="buttons">
                <div class="img-btn-wrapper" onclick="toggleMenu()">
                    <img src="result.png">
                    <div class="btn-label">Menu</div>
                </div>

                <div class="img-btn-wrapper" onclick="toggleAbout()">
                    <img src="result.png">
                    <div class="btn-label">About</div>
                </div>

                <div class="img-btn-wrapper" onclick="openBooking()">
                    <img src="result.png">
                    <div class="btn-label">Contact</div>
                </div>
            </div>

            <img id="menuImage" src="IMG_9815.jpg" class="menu-image" onclick="openLightbox(this.src)">
            <img id="aboutUsImage" src="coffee-shop-cafe-social-media-post-template-promotion-flyer-brochure-vector.jpg" class="about-image" onclick="openLightbox(this.src)">
        </div>
    </div>

    <script>
        const menuImage = document.getElementById("menuImage");
        const aboutUsImage = document.getElementById("aboutUsImage");
        const eventsPanel = document.getElementById("eventsPanel");
        const eventsList = document.getElementById("eventsList");

        const bookingModal = document.getElementById("bookingModal");
        const bookingDate = document.getElementById("bookingDate");
        const bookingComment = document.getElementById("bookingComment");
        const datesList = document.getElementById("datesList");

        const passwordModal = document.getElementById("passwordModal");
        const passwordInput = document.getElementById("passwordInput");

        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightboxImg");

        const PASSWORD = "bibbles123";
        const ADMIN_EMAIL = "carlos_bust160@yahoo.com";

        let events = [];
        let selectedDates = [];
        let pendingAction = "";

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = "flex";
        }

        function closeLightbox() {
            lightbox.style.display = "none";
            lightboxImg.src = "";
        }

        function toggleMenu() {
            menuImage.style.display = menuImage.style.display === "block" ? "none" : "block";
            aboutUsImage.style.display = "none";
            eventsPanel.style.display = "none";
        }

        function toggleAbout() {
            aboutUsImage.style.display = aboutUsImage.style.display === "block" ? "none" : "block";
            menuImage.style.display = "none";
            eventsPanel.style.display = "none";
        }

        function toggleEvents() {
            eventsPanel.style.display = eventsPanel.style.display === "block" ? "none" : "block";
            menuImage.style.display = "none";
            aboutUsImage.style.display = "none";
        }

        function openBooking() {
            bookingModal.style.display = "flex";
        }

        function closeBooking() {
            bookingModal.style.display = "none";
        }

        function sendBooking() {
            const subject = encodeURIComponent("Booking Request");
            const body = encodeURIComponent(
                selectedDates.join("\n") + "\n\n" + bookingComment.value
            );
            window.location.href = `mailto:${ADMIN_EMAIL}?subject=${subject}&body=${body}`;
        }

        function openPasswordModal(action) {
            pendingAction = action;
            passwordModal.style.display = "flex";
        }

        function closePasswordModal() {
            passwordModal.style.display = "none";
            passwordInput.value = "";
        }

        function checkPassword() {
            if (passwordInput.value !== PASSWORD) return alert("Wrong password");

            closePasswordModal();

            if (pendingAction === "add") addEvent();
            if (pendingAction.startsWith("delete-")) {
                const i = parseInt(pendingAction.split("-")[1]);
                events.splice(i, 1);
                renderEvents();
            }
        }

        function addEvent() {
            const title = prompt("Event title:");
            const date = prompt("Date:");
            if (!title || !date) return;

            events.push({ title, date });
            renderEvents();
        }

        function renderEvents() {
            eventsList.innerHTML = "";
            events.forEach((e, i) => {
                const div = document.createElement("div");
                div.className = "event";
                div.innerHTML = `
                    <strong>${e.title}</strong>
                    <p>${e.date}</p>
                    <span class="delete-btn" onclick="openPasswordModal('delete-${i}')">🗑</span>
                `;
                eventsList.appendChild(div);
            });
        }
    </script>

</body>
</html>
